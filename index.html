<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHFLIX - Premium Data Insights</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            transition: background 0.5s ease, color 0.5s ease; 
            overflow-x: hidden; 
        }
        
        .chart-container { 
            width: 100%; 
            height: 400px; 
            opacity: 0; 
            transform: translateY(50px); 
        }
        
        .metric-card { 
            opacity: 0; 
            transform: scale(0.8); 
        }
        
        #netflix-logo { 
            transform: rotate(-10deg) scale(0); 
            opacity: 0; 
        }
        
        #curtain { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 100; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #E50914; 
            font-size: 3rem; 
            font-weight: 800; 
        }
        
        .midia-container { 
            width: 100%; 
            max-height: 600px; 
            object-fit: cover; 
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #E50914; border-radius: 10px; }
    </style>
</head>
<body class="bg-black text-white antialiased">

    <div id="curtain">DASHFLIX</div>

    <header class="fixed top-0 left-0 w-full z-50 bg-black/80 backdrop-blur-md p-4 flex justify-between items-center border-b border-gray-800">
        <div class="flex items-center gap-2">
            <img id="netflix-logo" src="https://upload.wikimedia.org/wikipedia/commons/e/ea/Netflix_Logomark.png" alt="Netflix" class="h-10">
            <h1 class="text-2xl font-extrabold tracking-tighter text-white">DASH<span class="text-red-600">FLIX</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <button id="lang-switch" class="bg-red-600 text-white px-5 py-2 rounded-full text-sm font-bold hover:scale-110 transition-transform duration-300 shadow-lg shadow-red-600/20">
                EN / PT
            </button>
            <a href="painel.html" class="text-gray-400 hover:text-white text-sm font-medium transition-colors">Acessar Painel</a>
        </div>
    </header>

    <main class="pt-32 pb-20 px-4 md:px-10 max-w-7xl mx-auto">
        
        <section class="mb-20 text-center">
            <h2 id="hero-title" class="text-5xl md:text-8xl font-extrabold tracking-tighter mb-6 opacity-0 y-20-anim">
                Métricas Premium
            </h2>
            <p id="hero-subtitle" class="text-xl md:text-2xl text-gray-400 max-w-3xl mx-auto mb-12 opacity-0 y-20-anim">
                Visualização interativa de dados do Kaggle processados via Python e Directus.
            </p>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8" id="summary-container">
            </div>
        </section>

        <section id="midia-section" class="mb-20 opacity-0 y-20-anim hidden">
            <div class="bg-gray-900/40 p-2 rounded-3xl border border-gray-800">
                <div id="midia-content"></div>
            </div>
        </section>

        <section id="graficos-dinamicos" class="grid grid-cols-1 lg:grid-cols-2 gap-12 mb-20">
        </section>

        <section class="mt-20 bg-gray-900/30 p-8 rounded-3xl border border-gray-800 opacity-0 y-50-anim">
            <div class="flex justify-between items-center mb-8">
                <h3 id="table-title" class="text-3xl font-bold tracking-tight">Últimos Lançamentos</h3>
                <span class="bg-red-600/10 text-red-500 text-xs font-bold px-3 py-1 rounded-full border border-red-500/20 uppercase tracking-widest">Live Data</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-400">
                    <thead class="text-xs text-gray-500 uppercase border-b border-gray-800">
                        <tr>
                            <th class="px-6 py-4">ID</th>
                            <th id="th-type" class="px-6 py-4">Tipo</th>
                            <th id="th-title" class="px-6 py-4">Título</th>
                            <th id="th-year" class="px-6 py-4">Ano</th>
                        </tr>
                    </thead>
                    <tbody id="titulos-body" class="divide-y divide-gray-800/50">
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer class="text-center p-12 text-gray-600 border-t border-gray-900 mt-20">
        <p class="text-sm">DASHFLIX &copy; 2026 - Inteligência de Dados via Contabo & Dokploy</p>
    </footer>

    <script>
        const FLASK_API = "https://api-dashflix.leanttro.com/api";
        const DIRECTUS_API = "https://api.leanttro.com";

        let visualConfig = {};
        let currentLang = 'pt';

        const i18n = {
            pt: {
                hero_title: "Métricas Premium",
                hero_subtitle: "Visualização interativa de dados do Kaggle processados via Python e Directus.",
                total_labels: "Total de Títulos",
                movies_label: "Filmes",
                shows_label: "Séries de TV",
                table_title: "Últimos Lançamentos",
                th_type: "Tipo",
                th_title: "Título",
                th_year: "Ano"
            },
            en: {
                hero_title: "Premium Metrics",
                hero_subtitle: "Interactive visualization of Kaggle data processed via Python and Directus.",
                total_labels: "Total Titles",
                movies_label: "Movies",
                shows_label: "TV Shows",
                table_title: "Latest Releases",
                th_type: "Type",
                th_title: "Title",
                th_year: "Year"
            }
        };

        async function loadVisualConfig() {
            try {
                const response = await fetch(`${DIRECTUS_API}/items/configuracoes_dashflix/1`);
                const { data } = await response.json();
                
                if (data) {
                    visualConfig = data;
                    document.body.style.fontFamily = `'${data.fonte || 'Poppins'}', sans-serif`;
                    
                    if (data.tema === 'light') {
                        document.body.classList.replace('bg-black', 'bg-gray-50');
                        document.body.classList.replace('text-white', 'text-gray-900');
                        document.querySelectorAll('header, footer, div.bg-gray-900\\/30, div.bg-gray-900\\/40').forEach(el => {
                            el.classList.add('bg-white', 'border-gray-200');
                        });
                    } else if (data.cor_fundo) {
                        document.body.style.backgroundColor = data.cor_fundo;
                    }

                    const primary = data.cor_primaria || '#E50914';
                    document.documentElement.style.setProperty('--primary-color', primary);
                    document.getElementById('lang-switch').style.backgroundColor = primary;

                    if (data.midia_url) {
                        const section = document.getElementById('midia-section');
                        const content = document.getElementById('midia-content');
                        section.classList.remove('hidden');
                        
                        if (data.midia_tipo === 'video') {
                            content.innerHTML = `<video src="${data.midia_url}" autoplay loop muted playsinline class="midia-container"></video>`;
                        } else {
                            content.innerHTML = `<img src="${data.midia_url}" class="midia-container" alt="Destaque">`;
                        }
                    }
                }
            } catch (err) {
                console.error("Erro ao carregar Directus Config:", err);
            }
        }

        async function loadDashboardData() {
            try {
                const resResumo = await fetch(`${FLASK_API}/resumo`);
                const dataResumo = await resResumo.json();
                
                const total = dataResumo.reduce((acc, curr) => acc + curr.count, 0);
                const movies = dataResumo.find(i => i.type === 'Movie')?.count || 0;
                const shows = dataResumo.find(i => i.type === 'TV Show')?.count || 0;

                const lang = i18n[currentLang];
                
                document.getElementById('summary-container').innerHTML = `
                    <div class="metric-card bg-gray-900/60 p-10 rounded-3xl border border-gray-800" style="border-bottom: 4px solid var(--primary-color)">
                        <p class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">${lang.total_labels}</p>
                        <h4 class="text-6xl font-black text-white">${total}</h4>
                    </div>
                    <div class="metric-card bg-gray-900/60 p-10 rounded-3xl border border-gray-800">
                        <p class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">${lang.movies_label}</p>
                        <h4 class="text-6xl font-black text-red-600">${movies}</h4>
                    </div>
                    <div class="metric-card bg-gray-900/60 p-10 rounded-3xl border border-gray-800">
                        <p class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">${lang.shows_label}</p>
                        <h4 class="text-6xl font-black text-red-600">${shows}</h4>
                    </div>
                `;

                const resTitulos = await fetch(`${FLASK_API}/titulos?limit=8`);
                const dataTitulos = await resTitulos.json();
                
                document.getElementById('titulos-body').innerHTML = dataTitulos.map(t => `
                    <tr class="hover:bg-red-600/5 transition-colors group">
                        <td class="px-6 py-4 font-mono text-gray-600 text-xs">${t.show_id}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${t.type === 'Movie' ? 'bg-blue-500/10 text-blue-500' : 'bg-green-500/10 text-green-500'}">
                                ${t.type}
                            </span>
                        </td>
                        <td class="px-6 py-4 font-bold text-gray-200 group-hover:text-white">${t.title}</td>
                        <td class="px-6 py-4 text-gray-500">${t.release_year}</td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error("Erro ao carregar dados do Flask:", err);
            }
        }

        function getChartOption(tipo, cor, labels, values) {
            const isPie = tipo === 'pie' || tipo === 'doughnut';
            
            let baseOpt = {
                backgroundColor: 'transparent',
                tooltip: { trigger: isPie ? 'item' : 'axis', backgroundColor: '#1f2937', borderColor: '#374151', textStyle: { color: '#fff' } },
                color: [cor, '#3b82f6', '#10b981', '#f59e0b']
            };

            if (isPie) {
                baseOpt.series = [{
                    type: 'pie',
                    radius: tipo === 'doughnut' ? ['45%', '75%'] : '75%',
                    avoidLabelOverlap: false,
                    itemStyle: { borderRadius: 8, borderColor: 'transparent', borderWidth: 2 },
                    label: { show: false },
                    data: labels.map((l, idx) => ({ name: l, value: values[idx] }))
                }];
            } else {
                const isHorizontal = tipo === 'bar_horizontal';
                baseOpt.xAxis = isHorizontal ? { type: 'value', splitLine: { show: false } } : { type: 'category', data: labels, axisLine: { lineStyle: { color: '#4b5563' } } };
                baseOpt.yAxis = isHorizontal ? { type: 'category', data: labels, axisLine: { lineStyle: { color: '#4b5563' } } } : { type: 'value', splitLine: { lineStyle: { color: '#1f2937' } } };
                
                baseOpt.series = [{
                    data: values,
                    type: tipo === 'area' ? 'line' : (isHorizontal ? 'bar' : tipo),
                    smooth: true,
                    areaStyle: tipo === 'area' ? { opacity: 0.4 } : null,
                    itemStyle: { borderRadius: tipo === 'bar' || isHorizontal ? [0, 5, 5, 0] : 0 }
                }];
            }
            return baseOpt;
        }

        async function initCharts() {
            const container = document.getElementById('graficos-dinamicos');
            container.innerHTML = '';
            
            const configGraficos = visualConfig.graficos || [];
            let chartInstances = [];

            for (let i = 0; i < configGraficos.length; i++) {
                const g = configGraficos[i];
                
                const card = document.createElement('div');
                card.className = 'bg-gray-900/40 p-8 rounded-3xl border border-gray-800 opacity-0 y-50-anim';
                if (visualConfig.tema === 'light') card.classList.replace('bg-gray-900/40', 'bg-white');
                
                card.innerHTML = `
                    <h3 class="text-2xl font-black mb-1 tracking-tighter">${g.titulo}</h3>
                    <p class="text-sm text-gray-500 mb-8 font-medium">${g.sub}</p>
                    <div id="chart-id-${i}" class="chart-container"></div>
                `;
                container.appendChild(card);

                const chartDom = document.getElementById(`chart-id-${i}`);
                const myChart = echarts.init(chartDom, visualConfig.tema === 'light' ? 'light' : 'dark');
                chartInstances.push(myChart);

                try {
                    const res = await fetch(`${FLASK_API}${g.endpoint}`);
                    const rawData = await res.json();
                    
                    let labels = [];
                    let values = [];

                    if (g.endpoint === '/top-paises') {
                        labels = rawData.map(d => d.pais);
                        values = rawData.map(d => d.total);
                        if (g.tipo === 'bar_horizontal') { labels.reverse(); values.reverse(); }
                    } else {
                        rawData.sort((a,b) => a.release_year - b.release_year);
                        labels = rawData.map(d => d.release_year);
                        values = rawData.map(d => d.count);
                    }

                    myChart.setOption(getChartOption(g.tipo, g.cor, labels, values));
                } catch (err) { console.error("Erro no gráfico", i, err); }
            }

            // Armazenar as instâncias para uso futuro
            window.chartInstances = chartInstances;

            window.addEventListener('resize', () => chartInstances.forEach(c => c.resize()));
        }

        function runAnimations() {
            const tl = gsap.timeline();
            
            tl.to('#curtain', { yPercent: -100, duration: 1.2, ease: "expo.inOut", delay: 0.5 })
              .to('#netflix-logo', { scale: 1, rotate: 0, opacity: 1, duration: 0.8, ease: "back.out(1.7)" }, "-=0.4")
              .to('.y-20-anim', { y: 0, opacity: 1, duration: 1, stagger: 0.2, ease: "power4.out" }, "-=0.5")
              .to('.metric-card', { scale: 1, opacity: 1, duration: 0.8, stagger: 0.1, ease: "back.out(1.2)" }, "-=0.8")
              .add(() => {
                  initCharts();
                  document.querySelectorAll('.y-50-anim').forEach(el => {
                      gsap.to(el, {
                          scrollTrigger: { trigger: el, start: "top 85%" },
                          y: 0, opacity: 1, duration: 1.2, ease: "power3.out"
                      });
                  });
              });
        }

        document.getElementById('lang-switch').addEventListener('click', async () => {
            currentLang = currentLang === 'pt' ? 'en' : 'pt';
            const lang = i18n[currentLang];
            
            document.getElementById('hero-title').innerText = lang.hero_title;
            document.getElementById('hero-subtitle').innerText = lang.hero_subtitle;
            document.getElementById('table-title').innerText = lang.table_title;
            document.getElementById('th-type').innerText = lang.th_type;
            document.getElementById('th-title').innerText = lang.th_title;
            document.getElementById('th-year').innerText = lang.th_year;
            
            // Recarrega dados da tabela e mantém gráficos
            await loadDashboardData();
            
            // Força o redesenho dos gráficos (já existentes)
            if (window.chartInstances) {
                window.chartInstances.forEach(chart => chart.resize());
            } else {
                // Se os gráficos ainda não foram criados, chama initCharts
                initCharts();
            }
        });

        window.addEventListener('load', async () => {
            gsap.registerPlugin(ScrollTrigger);
            await loadVisualConfig();
            await loadDashboardData();
            runAnimations();
        });
    </script>
</body>
</html>
