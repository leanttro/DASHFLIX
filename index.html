<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHFLIX - Premium Data Insights</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            transition: background 0.5s ease, color 0.5s ease; 
            overflow-x: hidden; 
        }
        .chart-container { 
            width: 100%; 
            height: 400px; 
            opacity: 0; 
            transform: translateY(50px); 
        }
        .metric-card { 
            opacity: 0; 
            transform: scale(0.8); 
        }
        #netflix-logo { 
            transform: rotate(-10deg) scale(0); 
            opacity: 0; 
        }
        #curtain { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 100; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #E50914; 
            font-size: 3rem; 
            font-weight: 800; 
        }
        .midia-container { 
            width: 100%; 
            max-height: 600px; 
            object-fit: cover; 
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #E50914; border-radius: 10px; }
        .filter-select {
            background-color: rgba(0,0,0,0.5);
            border: 1px solid #333;
            border-radius: 0.5rem;
            padding: 0.5rem;
            color: white;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .filter-select:focus {
            outline: none;
            border-color: #E50914;
        }
        .theme-light .filter-select {
            background-color: #f3f4f6;
            color: #1f2937;
            border-color: #d1d5db;
        }
    </style>
</head>
<body class="bg-black text-white antialiased" id="app-body">

    <div id="curtain">DASHFLIX</div>

    <header class="fixed top-0 left-0 w-full z-50 bg-black/80 backdrop-blur-md p-4 flex justify-between items-center border-b border-gray-800">
        <div class="flex items-center gap-2">
            <img id="netflix-logo" src="https://upload.wikimedia.org/wikipedia/commons/e/ea/Netflix_Logomark.png" alt="Netflix" class="h-10">
            <h1 class="text-2xl font-extrabold tracking-tighter text-white">DASH<span class="text-red-600">FLIX</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <button id="lang-switch" class="bg-red-600 text-white px-5 py-2 rounded-full text-sm font-bold hover:scale-110 transition-transform duration-300 shadow-lg shadow-red-600/20">
                EN / PT
            </button>
            <a href="painel.html" class="text-gray-400 hover:text-white text-sm font-medium transition-colors">Acessar Painel</a>
        </div>
    </header>

    <main class="pt-32 pb-20 px-4 md:px-10 max-w-7xl mx-auto">
        
        <!-- Cards de métricas -->
        <section class="mb-20 text-center">
            <h2 id="hero-title" class="text-5xl md:text-8xl font-extrabold tracking-tighter mb-6 opacity-0 y-20-anim">
                Métricas Premium
            </h2>
            <p id="hero-subtitle" class="text-xl md:text-2xl text-gray-400 max-w-3xl mx-auto mb-12 opacity-0 y-20-anim">
                Visualização interativa de dados do Kaggle processados via Python e Directus.
            </p>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8" id="summary-container">
            </div>
        </section>

        <!-- Mídia configurável (opcional) -->
        <section id="midia-section" class="mb-20 opacity-0 y-20-anim hidden">
            <div class="bg-gray-900/40 p-2 rounded-3xl border border-gray-800">
                <div id="midia-content"></div>
            </div>
        </section>

        <!-- Filtros interativos -->
        <div class="mb-12 p-6 rounded-2xl bg-gray-900/30 border border-gray-800 backdrop-blur-sm">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label id="filter-year-label" class="block text-sm font-semibold text-gray-400 mb-2">Ano</label>
                    <select id="filter-year" class="filter-select w-full">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div>
                    <label id="filter-country-label" class="block text-sm font-semibold text-gray-400 mb-2">País</label>
                    <select id="filter-country" class="filter-select w-full">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div>
                    <label id="filter-rating-label" class="block text-sm font-semibold text-gray-400 mb-2">Classificação</label>
                    <select id="filter-rating" class="filter-select w-full">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div>
                    <label id="filter-type-label" class="block text-sm font-semibold text-gray-400 mb-2">Tipo</label>
                    <select id="filter-type" class="filter-select w-full">
                        <option value="">Todos</option>
                        <option value="Movie">Filmes</option>
                        <option value="TV Show">Séries</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Gráficos dinâmicos (agora interativos e baseados nos filtros) -->
        <section id="graficos-dinamicos" class="grid grid-cols-1 lg:grid-cols-2 gap-12 mb-20">
            <!-- Os gráficos serão inseridos via JS -->
        </section>

        <!-- Tabela de títulos (com filtros) -->
        <section class="mt-20 bg-gray-900/30 p-8 rounded-3xl border border-gray-800 opacity-0 y-50-anim">
            <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
                <h3 id="table-title" class="text-3xl font-bold tracking-tight">Últimos Lançamentos</h3>
                <span class="bg-red-600/10 text-red-500 text-xs font-bold px-3 py-1 rounded-full border border-red-500/20 uppercase tracking-widest">Live Data</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-400">
                    <thead class="text-xs text-gray-500 uppercase border-b border-gray-800">
                        <tr>
                            <th class="px-6 py-4">ID</th>
                            <th id="th-type" class="px-6 py-4">Tipo</th>
                            <th id="th-title" class="px-6 py-4">Título</th>
                            <th id="th-year" class="px-6 py-4">Ano</th>
                            <th id="th-country" class="px-6 py-4">País</th>
                            <th id="th-rating" class="px-6 py-4">Classificação</th>
                        </tr>
                    </thead>
                    <tbody id="titulos-body" class="divide-y divide-gray-800/50">
                        <tr><td colspan="6" class="text-center py-8">Carregando dados...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer class="text-center p-12 text-gray-600 border-t border-gray-900 mt-20">
        <p class="text-sm">DASHFLIX &copy; 2026 - Inteligência de Dados via Contabo & Dokploy</p>
    </footer>

    <script>
        // ==================== CONFIGURAÇÕES GLOBAIS ====================
        const FLASK_API = "https://api-dashflix.leanttro.com/api";
        const DIRECTUS_API = "https://api.leanttro.com";

        let visualConfig = {};
        let currentLang = 'pt';
        let allData = [];           // Todos os títulos carregados
        let filteredData = [];      // Dados após aplicação dos filtros
        let chartInstances = {};

        // ==================== TRADUÇÕES ====================
        const i18n = {
            pt: {
                hero_title: "Métricas Premium",
                hero_subtitle: "Visualização interativa de dados do Kaggle processados via Python e Directus.",
                total_labels: "Total de Títulos",
                movies_label: "Filmes",
                shows_label: "Séries de TV",
                table_title: "Últimos Lançamentos",
                th_type: "Tipo",
                th_title: "Título",
                th_year: "Ano",
                th_country: "País",
                th_rating: "Classificação",
                filter_year: "Ano",
                filter_country: "País",
                filter_rating: "Classificação",
                filter_type: "Tipo",
                all: "Todos"
            },
            en: {
                hero_title: "Premium Metrics",
                hero_subtitle: "Interactive visualization of Kaggle data processed via Python and Directus.",
                total_labels: "Total Titles",
                movies_label: "Movies",
                shows_label: "TV Shows",
                table_title: "Latest Releases",
                th_type: "Type",
                th_title: "Title",
                th_year: "Year",
                th_country: "Country",
                th_rating: "Rating",
                filter_year: "Year",
                filter_country: "Country",
                filter_rating: "Rating",
                filter_type: "Type",
                all: "All"
            }
        };

        // ==================== CARREGAR CONFIGURAÇÃO VISUAL (DIRECTUS) ====================
        async function loadVisualConfig() {
            try {
                const response = await fetch(`${DIRECTUS_API}/items/configuracoes_dashflix/1`);
                const { data } = await response.json();
                if (data) {
                    visualConfig = data;
                    document.body.style.fontFamily = `'${data.fonte || 'Poppins'}', sans-serif`;
                    if (data.tema === 'light') {
                        document.body.classList.add('theme-light');
                        document.body.classList.replace('bg-black', 'bg-gray-50');
                        document.body.classList.replace('text-white', 'text-gray-900');
                        document.querySelectorAll('header, footer, div.bg-gray-900\\/30, div.bg-gray-900\\/40, .filter-select').forEach(el => {
                            el.classList.add('bg-white', 'border-gray-200');
                        });
                    } else if (data.cor_fundo) {
                        document.body.style.backgroundColor = data.cor_fundo;
                    }
                    const primary = data.cor_primaria || '#E50914';
                    document.documentElement.style.setProperty('--primary-color', primary);
                    document.getElementById('lang-switch').style.backgroundColor = primary;
                    if (data.midia_url) {
                        const section = document.getElementById('midia-section');
                        const content = document.getElementById('midia-content');
                        section.classList.remove('hidden');
                        if (data.midia_tipo === 'video') {
                            content.innerHTML = `<video src="${data.midia_url}" autoplay loop muted playsinline class="midia-container"></video>`;
                        } else {
                            content.innerHTML = `<img src="${data.midia_url}" class="midia-container" alt="Destaque">`;
                        }
                    }
                }
            } catch (err) {
                console.error("Erro ao carregar config visual:", err);
            }
        }

        // ==================== CARREGAR TODOS OS TÍTULOS ====================
        async function loadAllTitles() {
            try {
                const response = await fetch(`${FLASK_API}/titulos?limit=10000`);
                const data = await response.json();
                allData = data;
                console.log(`Carregados ${allData.length} títulos.`);
                // Preencher os filtros com valores únicos
                populateFilters();
                // Aplicar filtros iniciais (todos)
                applyFilters();
                return true;
            } catch (err) {
                console.error("Erro ao carregar títulos:", err);
                return false;
            }
        }

        // ==================== PREENCHER OS DROPDOWNS DE FILTRO ====================
        function populateFilters() {
            const years = [...new Set(allData.map(item => item.release_year).filter(y => y))].sort((a,b)=>b-a);
            const countries = [...new Set(allData.flatMap(item => {
                if (!item.country) return [];
                // Pegar primeiro país (separado por vírgula)
                return item.country.split(',').map(c => c.trim());
            }))].sort();
            const ratings = [...new Set(allData.map(item => item.rating).filter(r => r))].sort();

            const yearSelect = document.getElementById('filter-year');
            yearSelect.innerHTML = '<option value="">' + (currentLang === 'pt' ? 'Todos' : 'All') + '</option>';
            years.forEach(y => {
                yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
            });

            const countrySelect = document.getElementById('filter-country');
            countrySelect.innerHTML = '<option value="">' + (currentLang === 'pt' ? 'Todos' : 'All') + '</option>';
            countries.forEach(c => {
                if (c) countrySelect.innerHTML += `<option value="${c}">${c}</option>`;
            });

            const ratingSelect = document.getElementById('filter-rating');
            ratingSelect.innerHTML = '<option value="">' + (currentLang === 'pt' ? 'Todos' : 'All') + '</option>';
            ratings.forEach(r => {
                if (r) ratingSelect.innerHTML += `<option value="${r}">${r}</option>`;
            });

            // Tipo já tem opções fixas
        }

        // ==================== APLICAR FILTROS ====================
        function applyFilters() {
            const year = document.getElementById('filter-year').value;
            const country = document.getElementById('filter-country').value;
            const rating = document.getElementById('filter-rating').value;
            const type = document.getElementById('filter-type').value;

            filteredData = allData.filter(item => {
                if (year && item.release_year != year) return false;
                if (type && item.type !== type) return false;
                if (rating && item.rating !== rating) return false;
                if (country) {
                    if (!item.country) return false;
                    const itemCountries = item.country.split(',').map(c => c.trim());
                    if (!itemCountries.includes(country)) return false;
                }
                return true;
            });

            // Atualizar cards de resumo
            updateSummaryCards();
            // Atualizar gráficos
            updateCharts();
            // Atualizar tabela
            updateTable();
        }

        // ==================== ATUALIZAR CARDS DE RESUMO ====================
        function updateSummaryCards() {
            const total = filteredData.length;
            const movies = filteredData.filter(i => i.type === 'Movie').length;
            const shows = filteredData.filter(i => i.type === 'TV Show').length;
            const lang = i18n[currentLang];
            document.getElementById('summary-container').innerHTML = `
                <div class="metric-card bg-gray-900/60 p-10 rounded-3xl border border-gray-800" style="border-bottom: 4px solid var(--primary-color)">
                    <p class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">${lang.total_labels}</p>
                    <h4 class="text-6xl font-black text-white">${total.toLocaleString()}</h4>
                </div>
                <div class="metric-card bg-gray-900/60 p-10 rounded-3xl border border-gray-800">
                    <p class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">${lang.movies_label}</p>
                    <h4 class="text-6xl font-black text-red-600">${movies.toLocaleString()}</h4>
                </div>
                <div class="metric-card bg-gray-900/60 p-10 rounded-3xl border border-gray-800">
                    <p class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">${lang.shows_label}</p>
                    <h4 class="text-6xl font-black text-red-600">${shows.toLocaleString()}</h4>
                </div>
            `;
        }

        // ==================== ATUALIZAR GRÁFICOS ====================
        function updateCharts() {
            // Preparar dados para Top Países
            const countryCount = {};
            filteredData.forEach(item => {
                if (item.country) {
                    const firstCountry = item.country.split(',')[0].trim();
                    countryCount[firstCountry] = (countryCount[firstCountry] || 0) + 1;
                }
            });
            const topCountries = Object.entries(countryCount)
                .sort((a,b) => b[1] - a[1])
                .slice(0, 10);
            const countryLabels = topCountries.map(p => p[0]);
            const countryValues = topCountries.map(p => p[1]);

            // Preparar dados para Lançamentos por Ano
            const yearCount = {};
            filteredData.forEach(item => {
                const y = item.release_year;
                if (y) yearCount[y] = (yearCount[y] || 0) + 1;
            });
            const years = Object.keys(yearCount).sort((a,b)=>a-b);
            const yearValues = years.map(y => yearCount[y]);

            // Preparar dados para Distribuição por Tipo (opcional, mas faremos um gráfico de pizza)
            const typeCount = {
                Movie: filteredData.filter(i => i.type === 'Movie').length,
                'TV Show': filteredData.filter(i => i.type === 'TV Show').length
            };
            const typeLabels = Object.keys(typeCount);
            const typeValues = Object.values(typeCount);

            // Renderizar os gráficos usando ECharts
            renderChart('chart-top-countries', 'bar', countryLabels, countryValues, visualConfig.cor_primaria || '#E50914', 'Top Países');
            renderChart('chart-releases-year', 'line', years, yearValues, visualConfig.cor_primaria || '#E50914', 'Lançamentos por Ano');
            renderChart('chart-type-dist', 'pie', typeLabels, typeValues, visualConfig.cor_primaria || '#E50914', 'Distribuição por Tipo');
        }

        function renderChart(containerId, type, labels, values, color, title) {
            let container = document.getElementById(containerId);
            if (!container) return;
            let chart = chartInstances[containerId];
            if (!chart) {
                chart = echarts.init(container, visualConfig.tema === 'light' ? 'light' : 'dark');
                chartInstances[containerId] = chart;
            }
            let option = {
                title: { text: title, left: 'center', textStyle: { color: '#aaa' } },
                tooltip: { trigger: type === 'pie' ? 'item' : 'axis' },
                color: [color],
                backgroundColor: 'transparent'
            };
            if (type === 'pie') {
                option.series = [{
                    type: 'pie',
                    radius: '55%',
                    data: labels.map((l, i) => ({ name: l, value: values[i] })),
                    label: { show: true, formatter: '{b}: {d}%' },
                    itemStyle: { borderRadius: 8 }
                }];
            } else if (type === 'bar') {
                option.xAxis = { type: 'category', data: labels, axisLabel: { rotate: 45, interval: 0 } };
                option.yAxis = { type: 'value' };
                option.series = [{ type: 'bar', data: values, itemStyle: { borderRadius: [4,4,0,0] } }];
            } else if (type === 'line') {
                option.xAxis = { type: 'category', data: labels };
                option.yAxis = { type: 'value' };
                option.series = [{ type: 'line', data: values, smooth: true, areaStyle: { opacity: 0.3 } }];
            }
            chart.setOption(option);
            chart.resize();
        }

        // ==================== ATUALIZAR TABELA ====================
        function updateTable() {
            const lang = i18n[currentLang];
            // Ordenar por date_added decrescente (mais recentes primeiro)
            const sorted = [...filteredData].sort((a,b) => {
                if (!a.date_added) return 1;
                if (!b.date_added) return -1;
                return new Date(b.date_added) - new Date(a.date_added);
            });
            const limited = sorted.slice(0, 50);
            const tbody = document.getElementById('titulos-body');
            if (limited.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8">${lang.all === 'Todos' ? 'Nenhum título encontrado' : 'No titles found'}</td></tr>`;
                return;
            }
            tbody.innerHTML = limited.map(t => `
                <tr class="hover:bg-red-600/5 transition-colors group">
                    <td class="px-6 py-4 font-mono text-gray-600 text-xs">${t.show_id || ''}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${t.type === 'Movie' ? 'bg-blue-500/10 text-blue-500' : 'bg-green-500/10 text-green-500'}">
                            ${t.type === 'Movie' ? (lang.movies_label === 'Filmes' ? 'Filme' : 'Movie') : (lang.shows_label === 'Séries de TV' ? 'Série' : 'TV Show')}
                        </span>
                    </td>
                    <td class="px-6 py-4 font-bold text-gray-200 group-hover:text-white">${t.title || ''}</td>
                    <td class="px-6 py-4 text-gray-500">${t.release_year || ''}</td>
                    <td class="px-6 py-4 text-gray-500">${t.country ? t.country.split(',')[0] : ''}</td>
                    <td class="px-6 py-4 text-gray-500">${t.rating || ''}</td>
                </tr>
            `).join('');
        }

        // ==================== ATUALIZAR TEXTOS DE IDIOMA ====================
        function updateLanguageTexts() {
            const lang = i18n[currentLang];
            document.getElementById('hero-title').innerText = lang.hero_title;
            document.getElementById('hero-subtitle').innerText = lang.hero_subtitle;
            document.getElementById('table-title').innerText = lang.table_title;
            document.getElementById('th-type').innerText = lang.th_type;
            document.getElementById('th-title').innerText = lang.th_title;
            document.getElementById('th-year').innerText = lang.th_year;
            document.getElementById('th-country').innerText = lang.th_country;
            document.getElementById('th-rating').innerText = lang.th_rating;
            document.getElementById('filter-year-label').innerText = lang.filter_year;
            document.getElementById('filter-country-label').innerText = lang.filter_country;
            document.getElementById('filter-rating-label').innerText = lang.filter_rating;
            document.getElementById('filter-type-label').innerText = lang.filter_type;
            // Atualizar opções "Todos" dos selects (manter valores atuais)
            const selects = ['filter-year', 'filter-country', 'filter-rating'];
            selects.forEach(id => {
                const select = document.getElementById(id);
                const options = select.options;
                if (options.length > 0 && options[0].value === '') {
                    options[0].text = lang.all;
                }
            });
            // Atualizar tipo (já tem opções fixas, mas traduzir)
            const typeSelect = document.getElementById('filter-type');
            if (typeSelect.options[0].value === '') typeSelect.options[0].text = lang.all;
            if (typeSelect.options[1]) typeSelect.options[1].text = lang.movies_label === 'Filmes' ? 'Filmes' : 'Movies';
            if (typeSelect.options[2]) typeSelect.options[2].text = lang.shows_label === 'Séries de TV' ? 'Séries' : 'TV Shows';
        }

        // ==================== INICIALIZAR PÁGINA ====================
        async function init() {
            gsap.registerPlugin(ScrollTrigger);
            await loadVisualConfig();
            await loadAllTitles();
            updateLanguageTexts();
            // Criar os contêineres dos gráficos
            const chartsContainer = document.getElementById('graficos-dinamicos');
            chartsContainer.innerHTML = `
                <div class="bg-gray-900/40 p-8 rounded-3xl border border-gray-800 opacity-0 y-50-anim" id="chart-top-countries-card">
                    <h3 class="text-2xl font-black mb-1 tracking-tighter">Top 10 Países</h3>
                    <p class="text-sm text-gray-500 mb-8 font-medium">Baseado nos filtros aplicados</p>
                    <div id="chart-top-countries" class="chart-container"></div>
                </div>
                <div class="bg-gray-900/40 p-8 rounded-3xl border border-gray-800 opacity-0 y-50-anim" id="chart-releases-year-card">
                    <h3 class="text-2xl font-black mb-1 tracking-tighter">Lançamentos por Ano</h3>
                    <p class="text-sm text-gray-500 mb-8 font-medium">Baseado nos filtros aplicados</p>
                    <div id="chart-releases-year" class="chart-container"></div>
                </div>
                <div class="bg-gray-900/40 p-8 rounded-3xl border border-gray-800 opacity-0 y-50-anim lg:col-span-2" id="chart-type-dist-card">
                    <h3 class="text-2xl font-black mb-1 tracking-tighter">Distribuição por Tipo</h3>
                    <p class="text-sm text-gray-500 mb-8 font-medium">Filmes vs Séries</p>
                    <div id="chart-type-dist" class="chart-container"></div>
                </div>
            `;
            // Aplicar tema aos novos cards
            if (visualConfig.tema === 'light') {
                document.querySelectorAll('#graficos-dinamicos > div').forEach(card => {
                    card.classList.replace('bg-gray-900/40', 'bg-white');
                });
            }
            // Atualizar gráficos (inicial)
            updateCharts();
            // Adicionar eventos aos filtros
            document.getElementById('filter-year').addEventListener('change', applyFilters);
            document.getElementById('filter-country').addEventListener('change', applyFilters);
            document.getElementById('filter-rating').addEventListener('change', applyFilters);
            document.getElementById('filter-type').addEventListener('change', applyFilters);
            // Animações GSAP
            const tl = gsap.timeline();
            tl.to('#curtain', { yPercent: -100, duration: 1.2, ease: "expo.inOut", delay: 0.5 })
              .to('#netflix-logo', { scale: 1, rotate: 0, opacity: 1, duration: 0.8, ease: "back.out(1.7)" }, "-=0.4")
              .to('.y-20-anim', { y: 0, opacity: 1, duration: 1, stagger: 0.2, ease: "power4.out" }, "-=0.5")
              .to('.metric-card', { scale: 1, opacity: 1, duration: 0.8, stagger: 0.1, ease: "back.out(1.2)" }, "-=0.8")
              .add(() => {
                  document.querySelectorAll('.y-50-anim').forEach(el => {
                      gsap.to(el, {
                          scrollTrigger: { trigger: el, start: "top 85%" },
                          y: 0, opacity: 1, duration: 1.2, ease: "power3.out"
                      });
                  });
              });
        }

        // ==================== TROCA DE IDIOMA ====================
        document.getElementById('lang-switch').addEventListener('click', () => {
            currentLang = currentLang === 'pt' ? 'en' : 'pt';
            updateLanguageTexts();
            updateSummaryCards();   // recria os cards com os textos atualizados
            updateTable();          // recria a tabela com os textos atualizados
            // Não recria os gráficos, apenas atualiza os títulos dentro deles (se quiser)
            // Mas os títulos dos gráficos já estão em inglês/português conforme o idioma atual
            // Como os títulos estão hardcoded, teríamos que atualizar também
            // Vamos atualizar os títulos dos gráficos dinamicamente
            const lang = i18n[currentLang];
            const chartTitles = {
                'chart-top-countries-card': `Top 10 ${lang.filter_country === 'País' ? 'Países' : 'Countries'}`,
                'chart-releases-year-card': `${lang.filter_year === 'Ano' ? 'Lançamentos por Ano' : 'Releases per Year'}`,
                'chart-type-dist-card': `${lang.movies_label === 'Filmes' ? 'Distribuição por Tipo' : 'Distribution by Type'}`
            };
            for (const [id, title] of Object.entries(chartTitles)) {
                const card = document.getElementById(id);
                if (card) {
                    const h3 = card.querySelector('h3');
                    if (h3) h3.innerText = title;
                }
            }
            // Se os gráficos existirem, atualizar o título do gráfico via setOption
            for (let [key, chart] of Object.entries(chartInstances)) {
                let option = chart.getOption();
                if (option.title && option.title.length) {
                    let newTitle = '';
                    if (key === 'chart-top-countries') newTitle = `Top 10 ${lang.filter_country === 'País' ? 'Países' : 'Countries'}`;
                    else if (key === 'chart-releases-year') newTitle = `${lang.filter_year === 'Ano' ? 'Lançamentos por Ano' : 'Releases per Year'}`;
                    else if (key === 'chart-type-dist') newTitle = `${lang.movies_label === 'Filmes' ? 'Distribuição por Tipo' : 'Distribution by Type'}`;
                    if (newTitle) {
                        option.title[0].text = newTitle;
                        chart.setOption(option);
                    }
                }
            }
        });

        // Iniciar
        init();
    </script>
</body>
</html>
