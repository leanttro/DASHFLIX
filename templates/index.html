<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHFLIX - Premium Data Insights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            transition: background 0.5s ease; 
            overflow-x: hidden; 
        }
        .chart-container { 
            width: 100%; 
            height: 400px; 
            opacity: 0; 
            transform: translateY(50px); 
        }
        .metric-card { 
            opacity: 0; 
            transform: scale(0.8); 
        }
        #netflix-logo { 
            transform: rotate(-10deg) scale(0); 
            opacity: 0; 
        }
        #curtain { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 100; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #E50914; 
            font-size: 3rem; 
            font-weight: 800; 
        }
        .midia-container { 
            width: 100%; 
            max-height: 500px; 
            object-fit: cover; 
            border-radius: 1rem; 
        }
    </style>
</head>
<body class="bg-black text-white antialiased">

    <div id="curtain">DASHFLIX</div>

    <header class="fixed top-0 left-0 w-full z-50 bg-black/80 backdrop-blur-sm p-4 flex justify-between items-center border-b border-gray-800">
        <div class="flex items-center gap-2">
            <img id="netflix-logo" src="https://upload.wikimedia.org/wikipedia/commons/e/ea/Netflix_Logomark.png" alt="Netflix" class="h-10">
            <h1 class="text-2xl font-extrabold tracking-tighter text-white">DASH<span class="text-red-600">FLIX</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <button id="lang-switch" class="bg-gray-800 text-white px-4 py-1.5 rounded-full text-sm font-semibold hover:bg-red-600 transition duration-300">EN/PT</button>
            <a href="painel.html" class="text-gray-400 hover:text-white text-sm">Painel</a>
        </div>
    </header>

    <main class="pt-28 pb-20 px-4 md:px-10 max-w-7xl mx-auto">
        
        <section class="mb-16 text-center">
            <h2 id="hero-title" class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-4 opacity-0 y-20-anim">Métricas Premium</h2>
            <p id="hero-subtitle" class="text-xl text-gray-400 max-w-2xl mx-auto mb-10 opacity-0 y-20-anim">Visualização interativa baseada no Kaggle</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="summary-container"></div>
        </section>

        <section id="midia-section" class="mb-16 opacity-0 y-20-anim hidden">
            <div class="bg-gray-900/50 p-4 rounded-2xl border border-gray-800 flex justify-center">
                <div id="midia-content" class="w-full"></div>
            </div>
        </section>

        <section id="graficos-dinamicos" class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-16"></section>

        <section class="mt-16 bg-gray-900/50 p-6 rounded-2xl border border-gray-800 opacity-0 y-50-anim">
            <h3 class="text-2xl font-bold mb-6 tracking-tight">Últimos Títulos Adicionados</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-300">
                    <thead class="text-xs text-gray-500 uppercase border-b border-gray-800">
                        <tr>
                            <th class="px-4 py-3">ID</th>
                            <th class="px-4 py-3">Tipo</th>
                            <th class="px-4 py-3">Título</th>
                            <th class="px-4 py-3">Lançamento</th>
                        </tr>
                    </thead>
                    <tbody id="titulos-body"></tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        const FLASK_API_URL = 'http://localhost:5001/api'; 
        const DIRECTUS_URL = 'http://localhost:8055';
        let visualConfig = {};
        let currentLang = 'pt';

        const translations = {
            pt: { hero_title: "Métricas Premium", hero_subtitle: "Visualização interativa baseada no Kaggle", total: "Total Títulos", movies: "Filmes", shows: "Séries" },
            en: { hero_title: "Premium Metrics", hero_subtitle: "Interactive visualization based on Kaggle", total: "Total Titles", movies: "Movies", shows: "TV Shows" }
        };

        async function loadVisualConfig() {
            try {
                const response = await fetch(`${DIRECTUS_URL}/items/configuracoes_dashflix/1`);
                const { data } = await response.json();
                if (data) {
                    visualConfig = data;
                    document.body.style.fontFamily = `'${data.fonte || 'Poppins'}', sans-serif`;
                    if (data.tema === 'light') {
                        document.body.classList.remove('bg-black', 'text-white');
                        document.body.classList.add('bg-white', 'text-gray-900');
                        document.querySelectorAll('header, div.bg-gray-900\\/50').forEach(el => el.classList.add('bg-gray-100', 'border-gray-200'));
                    } else {
                        document.body.style.backgroundColor = data.cor_fundo || '#000000';
                    }
                    document.documentElement.style.setProperty('--primary-color', data.cor_primaria || '#E50914');
                    document.getElementById('lang-switch').style.backgroundColor = data.cor_primaria || '#E50914';
                    
                    if (data.midia_url) {
                        const midiaSection = document.getElementById('midia-section');
                        midiaSection.classList.remove('hidden');
                        document.getElementById('midia-content').innerHTML = data.midia_tipo === 'video' 
                            ? `<video src="${data.midia_url}" autoplay loop muted class="midia-container"></video>`
                            : `<img src="${data.midia_url}" class="midia-container">`;
                    }
                }
            } catch (error) { console.error(error); }
        }

        async function loadDashboardData() {
            try {
                const rResumo = await fetch(`${FLASK_API_URL}/resumo`);
                const dResumo = await rResumo.json();
                const total = dResumo.reduce((a, b) => a + b.count, 0);
                const movies = dResumo.find(item => item.type === 'Movie')?.count || 0;
                const shows = dResumo.find(item => item.type === 'TV Show')?.count || 0;

                const lang = translations[currentLang];
                document.getElementById('summary-container').innerHTML = `
                    <div class="metric-card bg-gray-900/80 p-6 rounded-2xl border border-gray-800" style="border-top: 4px solid var(--primary-color)">
                        <p class="text-sm text-gray-500 uppercase font-semibold">${lang.total}</p>
                        <p class="text-5xl font-extrabold tracking-tighter text-white">${total}</p>
                    </div>
                    <div class="metric-card bg-gray-900/80 p-6 rounded-2xl border border-gray-800">
                        <p class="text-sm text-gray-500 uppercase font-semibold">${lang.movies}</p>
                        <p class="text-5xl font-extrabold tracking-tighter text-red-500">${movies}</p>
                    </div>
                    <div class="metric-card bg-gray-900/80 p-6 rounded-2xl border border-gray-800">
                        <p class="text-sm text-gray-500 uppercase font-semibold">${lang.shows}</p>
                        <p class="text-5xl font-extrabold tracking-tighter text-red-500">${shows}</p>
                    </div>
                `;
                
                const rTitulos = await fetch(`${FLASK_API_URL}/titulos?limit=5`);
                const dTitulos = await rTitulos.json();
                document.getElementById('titulos-body').innerHTML = dTitulos.map(t => `
                    <tr class="border-b border-gray-800 hover:bg-gray-800/30">
                        <td class="px-4 py-3 font-mono text-gray-500">${t.show_id}</td>
                        <td class="px-4 py-3">${t.type}</td>
                        <td class="px-4 py-3 font-semibold text-white">${t.title}</td>
                        <td class="px-4 py-3">${t.release_year}</td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }

        function getChartOption(type, color, labels, values) {
            const isPie = type === 'pie' || type === 'doughnut';
            let opt = {
                backgroundColor: 'transparent',
                tooltip: { trigger: isPie ? 'item' : 'axis' },
                color: [color, '#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de']
            };
            if (isPie) {
                opt.series = [{ 
                    type: 'pie', 
                    radius: type === 'doughnut' ? ['40%', '70%'] : '70%', 
                    data: labels.map((l, i) => ({ name: l, value: values[i] })), 
                    itemStyle: { borderRadius: 10, borderColor: '#000', borderWidth: 2 } 
                }];
            } else {
                const isH = type === 'bar_horizontal';
                opt.xAxis = isH ? { type: 'value' } : { type: 'category', data: labels };
                opt.yAxis = isH ? { type: 'category', data: labels } : { type: 'value' };
                opt.series = [{ 
                    type: type === 'area' ? 'line' : (isH ? 'bar' : type), 
                    data: values, 
                    smooth: true, 
                    areaStyle: type === 'area' ? { opacity: 0.3 } : null,
                    itemStyle: { borderRadius: (type === 'bar' || isH) ? [5, 5, 0, 0] : 0 }
                }];
            }
            return opt;
        }

        async function initCharts() {
            const container = document.getElementById('graficos-dinamicos');
            container.innerHTML = '';
            const graficos = visualConfig.graficos || [];
            let instancias = [];

            for (let i = 0; i < graficos.length; i++) {
                const g = graficos[i];
                const div = document.createElement('div');
                div.className = 'bg-gray-900/50 p-6 rounded-2xl border border-gray-800 opacity-0 y-50-anim';
                if (visualConfig.tema === 'light') div.classList.add('bg-gray-100', 'border-gray-200');
                
                div.innerHTML = `
                    <h3 class="text-2xl font-bold mb-2 tracking-tight">${g.titulo}</h3>
                    <p class="text-sm text-gray-400 mb-6">${g.sub}</p>
                    <div id="chart-${i}" style="width: 100%; height: 400px;"></div>
                `;
                container.appendChild(div);

                const chart = echarts.init(document.getElementById(`chart-${i}`), visualConfig.tema === 'light' ? 'light' : 'dark');
                instancias.push(chart);

                try {
                    const r = await fetch(`${FLASK_API_URL}${g.endpoint}`);
                    const data = await r.json();
                    let labels = g.endpoint === '/top-paises' ? data.map(item => item.pais) : data.sort((a,b)=>a.release_year-b.release_year).map(item => item.release_year);
                    let values = g.endpoint === '/top-paises' ? data.map(item => item.total) : data.map(item => item.count);
                    if(g.tipo === 'bar_horizontal' && g.endpoint === '/top-paises') { labels.reverse(); values.reverse(); }
                    chart.setOption(getChartOption(g.tipo, g.cor, labels, values));
                } catch (e) { console.error(e); }
            }
            window.addEventListener('resize', () => instancias.forEach(ins => ins.resize()));
        }

        document.getElementById('lang-switch').addEventListener('click', () => {
            currentLang = currentLang === 'pt' ? 'en' : 'pt';
            document.getElementById('hero-title').innerText = translations[currentLang].hero_title;
            document.getElementById('hero-subtitle').innerText = translations[currentLang].hero_subtitle;
            loadDashboardData();
            initCharts();
        });

        window.addEventListener('load', async () => {
            await loadVisualConfig();
            await loadDashboardData();
            gsap.timeline()
                .to('#curtain', { duration: 1, yPercent: -100, ease: "power4.inOut" })
                .to('#netflix-logo', { duration: 0.8, scale: 1, rotate: 0, opacity: 1, ease: "back.out(1.7)" }, "-=0.2")
                .to('.y-20-anim', { duration: 1, y: 0, opacity: 1, stagger: 0.2, ease: "power3.out" })
                .add(() => {
                    initCharts();
                    document.querySelectorAll('.y-50-anim').forEach(el => gsap.to(el, { scrollTrigger: { trigger: el, start: "top 80%" }, y: 0, opacity: 1, duration: 1, ease: "power3.out" }));
                });
        });
    </script>
</body>
</html>
